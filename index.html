    <style type="text/css">
:root {
  --bg: #f7f4ee;
  --card: #fffdf9;
  --card-border: #e8e2d4;
  --ink: #23222a;
  --ink-soft: #55524e;
  --accent: #8a6d1d;
  --accent-soft: #b89530;
  --link: #4a4494;
  --link-hover: #8a6d1d;
  --shadow: 0 1px 2px rgba(35, 34, 42, 0.05), 0 12px 40px -12px rgba(35, 34, 42, 0.18);
  --serif: 'Cormorant Garamond', 'Palatino Linotype', Palatino, Georgia, serif;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

html {
  -webkit-text-size-adjust: 100%;
}

body {
  margin: 0;
  font-family: var(--sans);
  background-color: var(--bg);
  color: var(--ink);
  top: 0 !important; /* keeps the Google Translate banner from pushing the page down */
}

/* ------- standard content card, created by the bundle's utils.stdDiv() ------- */
.acard {
  box-sizing: border-box;
  width: min(760px, 94vw);
  margin: clamp(16px, 4vh, 48px) auto;
  padding: clamp(20px, 4vw, 44px) clamp(18px, 5vw, 52px);
  background-color: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 18px;
  box-shadow: var(--shadow);
  font-size: 1.06rem;
  line-height: 1.65;
  color: var(--ink);
  overflow-wrap: break-word;
}

.acard h1, .acard h2, .acard h3, .acard h4,
.modal-content h1, .modal-content h2, .modal-content h3 {
  font-family: var(--serif);
  font-weight: 600;
  line-height: 1.15;
  color: var(--ink);
  letter-spacing: 0.005em;
}

.acard h1 { font-size: clamp(1.9rem, 4.5vw, 2.6rem); margin: 0.2em 0 0.6em; }
.acard h2 { font-size: clamp(1.6rem, 3.8vw, 2.15rem); margin: 0.3em 0 0.6em; }
.acard h3 { font-size: clamp(1.3rem, 3vw, 1.6rem); }

.acard a, .modal-content a, #afooter a {
  color: var(--link);
  text-decoration-color: color-mix(in srgb, var(--link) 35%, transparent);
  text-underline-offset: 2px;
  transition: color 0.2s ease;
}

.acard a:hover, .modal-content a:hover, #afooter a:hover {
  color: var(--link-hover);
}

.acard ul, .acard ol { padding-left: 1.4em; }
.acard li { margin: 0.45em 0; }
.acard li::marker { color: var(--accent-soft); }

/* ------- footer ------- */
#afooter {
  align-items: center;
  justify-content: center;
  gap: clamp(14px, 5vw, 44px);
  padding: 10px 16px 34px !important;
  font-size: 0.95rem;
}

#afooter a {
  font-size: inherit !important;
  float: none !important;
  margin: 0 !important;
  text-decoration: none;
}

#afooter a b { font-weight: 600; }

#afooter .flag_link {
  display: inline-flex;
  align-items: center;
  opacity: 0.85;
  transition: opacity 0.2s ease;
}

#afooter .flag_link:hover { opacity: 1; }
#afooter .fimg { height: 17px !important; border-radius: 3px; }

/* ------- loading veil ------- */
#loading {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  background-color: var(--bg);
  text-align: center;
}

#loading .aeglyph {
  font-family: var(--serif);
  font-size: 72px;
  line-height: 1;
  color: var(--accent);
  animation: aepulse 2s ease-in-out infinite;
}

#loading .aename {
  font-family: var(--serif);
  font-size: 24px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-soft);
}

#loading .aering {
  width: 26px;
  height: 26px;
  border: 2px solid var(--card-border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: aespin 1.1s linear infinite;
}

@keyframes aepulse {
  0%, 100% { opacity: 0.55; transform: scale(0.98); }
  50% { opacity: 1; transform: scale(1); }
}

@keyframes aespin {
  to { transform: rotate(360deg); }
}

/* ------- modal (support / get-involved dialog) ------- */
.modal {
  display: none;
  position: fixed;
  z-index: 10;
  padding-top: min(100px, 8vh);
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  overflow: auto;
  background-color: rgba(35, 34, 42, 0.45);
  backdrop-filter: blur(2px);
}

.modal-content {
  box-sizing: border-box;
  background-color: var(--card);
  margin: auto;
  padding: clamp(18px, 4vw, 36px);
  border: 1px solid var(--card-border);
  width: min(680px, 92vw);
  max-height: 80vh;
  overflow-y: auto;
  border-radius: 18px;
  box-shadow: var(--shadow);
  line-height: 1.6;
}

.modal-content textarea {
  box-sizing: border-box;
  width: 100% !important;
  min-height: 90px;
  padding: 10px;
  border: 1px solid var(--card-border);
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 1rem;
}

.modal-content button {
  padding: 8px 18px;
  border: 1px solid var(--card-border);
  border-radius: 999px;
  background: var(--bg);
  color: var(--ink);
  font-size: 0.95rem;
  cursor: pointer;
}

.modal-content button:hover { border-color: var(--accent-soft); color: var(--accent); }

.close {
  color: #aaaaaa;
  float: right;
  font-size: 28px;
  font-weight: bold;
  line-height: 1;
}

.close:hover,
.close:focus {
  color: var(--ink);
  text-decoration: none;
  cursor: pointer;
}

/* ------- Google Translate housekeeping ------- */
#google_translate_element { display: none; }
.skiptranslate { display: none; }

/* ------- on/off switch used by the artifact control panels ------- */
.switch {
  position: relative;
  display: inline-block;
  width: 90px;
  height: 34px;
}

.switch input { display: none; }

.slideraa {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #aaaa09;
  -webkit-transition: .4s;
  transition: .4s;
  border-radius: 34px;
}

.slideraa:before {
  position: absolute;
  content: "";
  height: 26px;
  width: 26px;
  left: 4px;
  bottom: 4px;
  background-color: white;
  -webkit-transition: .4s;
  transition: .4s;
  border-radius: 50%;
}

input:checked + .slideraa {
  background-color: #2ab934;
}

input:focus + .slideraa {
  box-shadow: 0 0 1px #2196F3;
}

input:checked + .slideraa:before {
  -webkit-transform: translateX(26px);
  -ms-transform: translateX(26px);
  transform: translateX(55px);
}

.slideraa:after {
  content: 'OFF';
  color: white;
  display: block;
  position: absolute;
  transform: translate(-50%,-50%);
  top: 50%;
  left: 50%;
  font-size: 10px;
  font-family: Verdana, sans-serif;
}

input:checked + .slideraa:after {
  content: 'ON';
}

/* ------- tooltips used by the artifact control panels ------- */
.tooltip {
  position: relative;
  display: inline-block;
  border-bottom: 1px dotted black;
}

.tooltip .tooltiptext {
  visibility: hidden;
  width: 120px;
  background-color: rgb(0,0,0,0.5);
  color: #fff;
  text-align: center;
  border-radius: 6px;
  padding: 5px;
  position: absolute;
  z-index: 1;
  top: 150%;
  left: 50%;
  margin-left: -60px;
  font-size: 150%;
  transition: opacity 0.8s;
}

.tooltip .tooltiptext::after {
  content: "";
  position: absolute;
  bottom: 100%;
  left: 50%;
  margin-left: -5px;
  border-width: 5px;
  border-style: solid;
  border-color: transparent transparent black transparent;
}

.tooltip.focus, .tooltip:focus {
  outline: 0;
  box-shadow: none !important;
}

.tooltip:hover .tooltiptext {
  visibility: visible;
}

.tooltip .tooltiptext:hover {
  visibility: hidden;
}
    </style>
  </head>

    </div>
